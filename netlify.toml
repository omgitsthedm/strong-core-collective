[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https:; connect-src 'self' https:; frame-src https:; base-uri 'self'; form-action 'self' https:"

# AI-Ops: keep internal docs private under publish="." (forced 404)
[[redirects]]
  from = "/.ai/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/CLAUDE.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/AGENTS.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/pricing"
  to = "/services/"
  status = 301

[[redirects]]
  from = "/pricing/"
  to = "/services/"
  status = 301
